<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  {%- include head.html -%}

  <body>

    {%- include header.html -%}

    {% if page.image %}
    <a href="{{ page.image }}" target="_blank" class="post-cover-link">
      <img src="{{ page.image }}" alt="封面图" class="post-cover-img">
    </a>
    {% endif %}

    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

    {%- include footer.html -%}

    <button id="back-to-top" title="回到顶部" onclick="window.scrollTo({top:0,left:0,behavior:'smooth'});">▲</button>
    <script>
    var btn = document.getElementById('back-to-top');
    window.addEventListener('scroll', function() {
      if (window.scrollY > 300) {
        btn.classList.add('show');
      } else {
        btn.classList.remove('show');
      }
    });
    </script>

    <script>
    (function() {
      var btn = document.getElementById('btn-immersive');
      var hidden = false;
      var targets = [];

      targets = Array.from(document.body.children).filter(function(el) {
        return el.tagName !== 'SCRIPT';
      });

      btn.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        if (!hidden) {
          targets.forEach(function(el) {
            el.style.transition = 'opacity 0.5s';
            el.style.opacity = '0';
            el.style.pointerEvents = 'none';
          });
          hidden = true;
        }
      });

      document.addEventListener('click', function(e) {
        if (hidden && e.target.id !== 'btn-immersive') {
          targets.forEach(function(el) {
            el.style.transition = 'opacity 0.5s';
            el.style.opacity = '1';
            el.style.pointerEvents = '';
            setTimeout(function() {
              el.style.transition = '';
            }, 500);
          });
          hidden = false;
        }
      });
    })();
    </script>
  </body>

</html>
