<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔒 需要密码</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: url('/images/haru-bg.png') center/cover no-repeat fixed;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .card {
      background: rgba(255,255,255,0.95);
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    .card h1 { font-size: 48px; margin-bottom: 8px; }
    .card p { color: #666; margin-bottom: 24px; font-size: 14px; }
    .card input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .card input:focus { border-color: #667eea; }
    .card button {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .card button:hover { background: #5a6fd6; }
    .error { color: #e74c3c; font-size: 13px; margin-top: 8px; display: none; }
    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔒</h1>
    <p>这篇文章需要密码才能阅读</p>
    <input type="password" id="password-input" placeholder="请输入密码" autofocus>
    <button onclick="decrypt()">解 锁</button>
    <p class="error" id="error">密码错误，请重试</p>
  </div>

  <script>
    const encryptedContent = `{{ encrypted }}`;
    const salt = `{{ salt }}`;

    function decrypt() {
      const password = document.getElementById('password-input').value;
      try {
        const decrypted = CryptoJS.AES.decrypt(encryptedContent, password + salt).toString(CryptoJS.enc.Utf8);
        if (decrypted && decrypted.startsWith('<!DOCTYPE html>')) {
          document.documentElement.innerHTML = decrypted;
        } else {
          document.getElementById('error').classList.add('show');
        }
      } catch(e) {
        document.getElementById('error').classList.add('show');
      }
    }

    document.getElementById('password-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') decrypt();
    });
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

  <script>
  (function() {
    var month = new Date().getMonth() + 1;
    var hour = new Date().getHours();
    var bgImage;

    if (month >= 3 && month <= 5) {
      bgImage = '/images/haru-bg.png';
    } else if (month >= 6 && month <= 8) {
      if (hour >= 5 && hour < 24) {
        bgImage = '/images/natsu-am-bg.jpg';
      } else {
        bgImage = '/images/natsu-pm-bg.jpg';
      }
    } else if (month >= 9 && month <= 11) {
      bgImage = '/images/aki-bg.png';
    } else {
      bgImage = '/images/fuyu-bg.jpg';
    }

    if (bgImage) {
      document.body.style.background = 'url(' + bgImage + ') center/cover no-repeat fixed';
    }
  })();
  </script>
</body>
</html>
